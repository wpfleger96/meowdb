# fly.toml app configuration file generated for meowdb on 2026-06-15T17:33:39-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'meowdb'
primary_region = 'iad'

[build]

[[mounts]]
  source = 'meowdb_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    port = 8000
    type = 'http'
    interval = '15s'
    timeout = '5s'
    grace_period = '15s'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
